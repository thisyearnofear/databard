# DataBard nginx config
# Deploy to: /etc/nginx/sites-available/databard
# Then: ln -s /etc/nginx/sites-available/databard /etc/nginx/sites-enabled/databard
# Then: certbot --nginx -d databard.persidian.com -d databard.thisyearnofear.com
# Then: nginx -t && systemctl reload nginx
#
# databard.persidian.com is the canonical domain.
# databard.thisyearnofear.com 301-redirects to it (legacy backlinks).

# ── Canonical domain: HTTP → HTTPS ──────────────────────────────
server {
    listen 80;
    server_name databard.persidian.com;
    return 301 https://$host$request_uri;
}

# ── Canonical domain: HTTPS ─────────────────────────────────────
server {
    listen 443 ssl;
    server_name databard.persidian.com;

    # SSL — filled in by certbot
    # ssl_certificate /etc/letsencrypt/live/databard.persidian.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/databard.persidian.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Increase for manifest.json uploads (dbt-local)
    client_max_body_size 100M;

    # SSE streaming — disable buffering for synthesize-stream
    location /api/synthesize-stream {
        proxy_pass http://127.0.0.1:42100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical for SSE — disable all buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://127.0.0.1:42100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

# ── Legacy domain: redirect everything to canonical ────────────
server {
    listen 80;
    server_name databard.thisyearnofear.com;
    return 301 https://databard.persidian.com$request_uri;
}

server {
    listen 443 ssl;
    server_name databard.thisyearnofear.com;

    # SSL — reuse the thisyearnofear cert (still valid until Sep 2026)
    # ssl_certificate /etc/letsencrypt/live/databard.thisyearnofear.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/databard.thisyearnofear.com/privkey.pem;

    return 301 https://databard.persidian.com$request_uri;
}
